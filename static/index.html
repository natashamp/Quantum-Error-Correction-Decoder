<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEC Decoder Simulator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Surface Code Decoder Simulator</h1>
            <p>Interactive visualization of quantum error correction decoding</p>
        </header>

        <div class="canvas-panel">
            <canvas id="lattice-canvas" width="500" height="500"></canvas>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <h3>Lattice</h3>
                <div class="control-row">
                    <label>Distance</label>
                    <select id="distance">
                        <option value="3">d = 3</option>
                        <option value="5" selected>d = 5</option>
                        <option value="7">d = 7</option>
                        <option value="9">d = 9</option>
                        <option value="11">d = 11</option>
                    </select>
                </div>
                <button id="btn-create" class="primary">Create Lattice</button>
            </div>

            <div class="control-group">
                <h3>Noise</h3>
                <div class="control-row">
                    <label>Model</label>
                    <select id="noise-model">
                        <option value="depolarizing">Depolarizing</option>
                        <option value="bit_flip">Bit Flip (X)</option>
                        <option value="phase_flip">Phase Flip (Z)</option>
                        <option value="biased">Biased</option>
                    </select>
                </div>
                <div class="control-row">
                    <label>p = <span id="p-value">0.05</span></label>
                    <input type="range" id="p-slider" min="0.01" max="0.20" step="0.01" value="0.05">
                </div>
                <button id="btn-inject">New Error</button>
            </div>

            <div class="control-group">
                <h3>Decode</h3>
                <div class="control-row">
                    <label>Decoder</label>
                    <select id="decoder">
                        <option value="mwpm">MWPM</option>
                        <option value="unionfind">Union-Find</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button id="btn-syndrome">Syndrome</button>
                    <button id="btn-decode">Decode</button>
                    <button id="btn-compare" class="accent">Compare Both</button>
                </div>
                <div style="margin-top: 8px;">
                    <button id="btn-auto" class="primary" style="width: 100%;">
                        Auto: Error + Syndrome + Compare
                    </button>
                </div>
            </div>

            <div class="control-group">
                <h3>Monte Carlo</h3>
                <div class="control-row">
                    <label>Trials</label>
                    <input type="number" id="num-trials" value="500" min="10" max="10000" step="100">
                </div>
                <button id="btn-trials">Run Trials</button>
                <div id="trials-result" style="margin-top: 6px;"></div>
            </div>

            <div class="control-group">
                <h3>Legend</h3>
                <div class="legend">
                    <span class="legend-item"><span class="legend-dot" style="background:#ff4444"></span> X error</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#4488ff"></span> Z error</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#cc44ff"></span> Y error</span>
                    <span class="legend-item"><span class="legend-diamond" style="background:#ff4444"></span> Z-defect</span>
                    <span class="legend-item"><span class="legend-diamond" style="background:#44aaff"></span> X-defect</span>
                    <span class="legend-item"><span class="legend-dot" style="border:2px dashed #ff8844; background:transparent"></span> Correction</span>
                </div>
            </div>

            <button id="btn-reset" style="width: 100%;">Reset</button>
        </div>

        <div class="results-panel">
            <span id="status">Loading...</span>
            <div id="decode-result"></div>
        </div>
    </div>

    <script src="/static/js/api_client.js"></script>
    <script src="/static/js/lattice_renderer.js"></script>
    <script src="/static/js/controls.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
